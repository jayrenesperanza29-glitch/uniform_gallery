##############################################################
#  render.yaml  –  Uniform Gallery full-stack Blueprint
#
#  Provisions in one click:
#    • uniform-db       – PostgreSQL (free)
#    • uniform-backend  – Python/Flask web service (free)
#    • uniform-frontend – Static site / Vite (free)
##############################################################

databases:
  - name: uniform-db
    databaseName: uniform_gallery
    user: uniform_user
    plan: free

services:
  # ── Backend ──────────────────────────────────────────────────────────────
  - type: web
    name: uniform-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: bash entrypoint.sh
    healthCheckPath: /api/health

    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: uniform-db
          property: connectionString

      - key: JWT_SECRET
        generateValue: true

      # Set these three manually in the Render dashboard after first deploy.
      # Dashboard → uniform-backend → Environment → Add Environment Variable
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

      - key: PYTHON_VERSION
        value: "3.12.0"

  # ── Frontend (static site) ────────────────────────────────────────────────
  - type: web
    name: uniform-frontend
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist

    routes:
      - type: rewrite
        source: /*
        destination: /index.html

    envVars:
      # After first backend deploy, replace this with your actual Render URL.
      - key: VITE_API_URL
        value: https://uniform-backend.onrender.com
